<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SOC Threat Detection Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-left">
      <span class="shield">🛡️</span>
      <h1>AI Threat Detection Dashboard</h1>
    </div>
    <div class="header-right">
      <span class="status-dot"></span>
      <span class="status-text">LIVE</span>
      <span id="last-updated">--</span>
      <span class="user-info" id="user-info"></span>
      <button onclick="logout()" class="logout-btn">Logout</button>
    </div>
  </header>

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-number" id="total-logs">0</div>
      <div class="stat-label">Total Logs</div>
    </div>
    <div class="stat-card danger">
      <div class="stat-number" id="total-alerts">0</div>
      <div class="stat-label">Total Alerts</div>
    </div>
    <div class="stat-card critical">
      <div class="stat-number" id="critical-count">0</div>
      <div class="stat-label">Critical</div>
    </div>
    <div class="stat-card high">
      <div class="stat-number" id="high-count">0</div>
      <div class="stat-label">High</div>
    </div>
    <div class="stat-card medium">
      <div class="stat-number" id="medium-count">0</div>
      <div class="stat-label">Medium</div>
    </div>
  </div>

  <!-- Main Content -->
  <div class="main-content">

    <!-- Left: Alerts Panel -->
    <div class="panel alerts-panel">
      <div class="panel-header">
        <h2>⚠️ Active Alerts</h2>
        <span class="badge" id="alert-badge">0</span>
      </div>
      <div class="alert-list" id="alert-list">
        <div class="loading">Loading alerts...</div>
      </div>
    </div>

    <!-- Right: Live Log Feed -->
    <div class="panel logs-panel">
      <div class="panel-header">
        <h2>📡 Live Log Feed</h2>
        <span class="badge" id="log-badge">0</span>
      </div>
      <div class="log-table-wrapper">
        <table class="log-table">
          <thead>
            <tr>
              <th>Time</th>
              <th>Source IP</th>
              <th>Dest IP</th>
              <th>Port</th>
              <th>Status</th>
              <th>Bytes</th>
              <th>Protocol</th>
              <th>Type</th>
            </tr>
          </thead>
          <tbody id="log-body"></tbody>
        </table>
      </div>
    </div>

  </div>

  <!-- Playbook Modal -->
  <div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h2 id="modal-title">Incident Playbook</h2>
        <button class="close-btn" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <p class="modal-subtitle" id="modal-subtitle"></p>
        <div class="modal-reason" id="modal-reason"></div>
        <ol class="playbook-steps" id="playbook-steps"></ol>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
